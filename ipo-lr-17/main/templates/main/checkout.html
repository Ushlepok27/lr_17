<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #f0e6dc 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Декоративные круги */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 109, 83, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 140, 83, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Падающие котики */
        #cat-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-cat {
            position: absolute;
            font-size: 24px;
            user-select: none;
            animation: fall linear infinite;
            opacity: 0.5;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.05));
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(105vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Навигация */
        nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: #6b5b4b;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 6px 16px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #8c6d53, #b8957a);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        nav a:hover {
            color: #4a3f35;
            background: rgba(140, 109, 83, 0.06);
        }

        nav a:hover::after {
            width: 60%;
        }

        /* Контейнер */
        .container {
            max-width: 560px;
            margin: 50px auto;
            padding: 45px 50px 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 20px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        /* Заголовок */
        h1 {
            margin: 0 0 8px 0;
            color: #3d7a42;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 span {
            font-size: 34px;
        }

        .subtitle {
            text-align: center;
            color: #8c7a6b;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #8c6d53, #b8957a);
            border-radius: 2px;
            margin: 0 auto 30px;
        }

        /* Форма */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a3f35;
            letter-spacing: 0.2px;
        }

        .form-group label .required {
            color: #c0392b;
            margin-left: 2px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e8ded6;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            color: #4a3f35;
            background: white;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #8c6d53;
            box-shadow: 0 0 0 4px rgba(140, 109, 83, 0.08);
            background: white;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #b5a89b;
            font-weight: 300;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group .hint {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            color: #b5a89b;
            font-weight: 400;
        }

        .form-group .hint .highlight {
            color: #8c6d53;
            font-weight: 500;
        }

        /* Кнопка */
        .btn-order {
            background: linear-gradient(135deg, #4e8c53, #3d7a42);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(78, 140, 83, 0.25);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn-order::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            border-radius: 50px;
            pointer-events: none;
        }

        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(78, 140, 83, 0.35);
            background: linear-gradient(135deg, #3d7a42, #2d6a32);
        }

        .btn-order:active {
            transform: translateY(0px);
            box-shadow: 0 2px 15px rgba(78, 140, 83, 0.2);
        }

        /* Ссылка назад */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: #8c6d53;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 50px;
            justify-content: center;
            width: 100%;
        }

        .back-link:hover {
            background: rgba(140, 109, 83, 0.06);
            color: #6d5340;
            transform: translateX(-4px);
        }

        .back-link::before {
            content: '←';
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .back-link:hover::before {
            transform: translateX(-4px);
        }

        /* Информационная карточка */
        .info-card {
            background: linear-gradient(135deg, #f8f2ec, #f0e8e0);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(140, 109, 83, 0.08);
        }

        .info-card .icon {
            font-size: 28px;
        }

        .info-card .text {
            font-size: 14px;
            color: #6b5b4b;
            line-height: 1.5;
        }

        .info-card .text strong {
            color: #4a3f35;
        }

        /* Адаптивность */
        @media (max-width: 640px) {
            .container {
                padding: 30px 24px 35px;
                margin: 30px 10px;
                border-radius: 24px;
            }

            h1 {
                font-size: 26px;
            }

            h1 span {
                font-size: 28px;
            }

            nav ul {
                gap: 15px;
            }

            nav a {
                font-size: 13px;
                padding: 5px 12px;
            }

            .form-group input,
            .form-group textarea {
                padding: 11px 14px;
                font-size: 14px;
            }

            .btn-order {
                font-size: 15px;
                padding: 14px 24px;
            }

            .info-card {
                padding: 14px 16px;
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px 16px 25px;
                margin: 20px 5px;
                border-radius: 18px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
            }

            nav ul {
                gap: 8px;
            }

            nav a {
                font-size: 12px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Падающие котики -->
    <div id="cat-container"></div>

    <!-- Навигация -->
    <nav>
        <ul>
            <li><a href="{% url 'catalog:index' %}">🏠 Главная</a></li>
            <li><a href="{% url 'catalog:product_list' %}">📦 Каталог</a></li>
            <li><a href="{% url 'catalog:cart_view' %}">🛒 Корзина</a></li>
        </ul>
    </nav>

    <!-- Основной контейнер -->
    <div class="container">
        <h1>
            <span>📋</span> Оформление заказа
        </h1>
        <p class="subtitle">Заполните данные для доставки</p>
        <div class="divider"></div>

        <!-- Информационная карточка -->
        <div class="info-card">
            <span class="icon">🐱</span>
            <span class="text">
                <strong>Дружелюбное напоминание:</strong> Мы ценим каждого клиента! Ваши данные в безопасности.
            </span>
        </div>

        <form method="post" action="">
            {% csrf_token %}
            
            <div class="form-group">
                <label>ФИО получателя <span class="required">*</span></label>
                <input 
                    type="text" 
                    name="full_name" 
                    value="{{ user.profile.full_name|default:'' }}" 
                    required 
                    placeholder="Иванов Иван Иванович">
            </div>

            <div class="form-group">
                <label>Контактный телефон <span class="required">*</span></label>
                <input 
                    type="text" 
                    name="phone" 
                    value="{{ user.profile.phone|default:'' }}" 
                    required 
                    placeholder="+375 (XX) XXX-XX-XX">
                <span class="hint">📱 Для связи с курьером</span>
            </div>

            <div class="form-group">
                <label>Адрес доставки <span class="required">*</span></label>
                <textarea 
                    name="address" 
                    rows="3" 
                    required 
                    placeholder="Улица, дом, квартира">{{ user.profile.address|default:'' }}</textarea>
                <span class="hint">
                    📍 Микрорайон: <span class="highlight">{{ user.profile.district|default:'не указан' }}</span>
                </span>
            </div>

            <button type="submit" class="btn-order">
                ✅ Подтвердить заказ
            </button>
        </form>
        
        <a href="{% url 'catalog:cart_view' %}" class="back-link">Вернуться в корзину</a>
    </div>

    <script>
        const catContainer = document.getElementById('cat-container');
        const catEmojis = ['🐱', '🐈', '🐾', '😸', '😻', '🐈‍⬛', '🐈‍⬛', '🐈'];
        
        function createCat() {
            const cat = document.createElement('div');
            cat.classList.add('floating-cat');
            cat.innerText = catEmojis[Math.floor(Math.random() * catEmojis.length)];
            cat.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 4 + 6;
            cat.style.animationDuration = duration + 's';
            cat.style.fontSize = Math.random() * 14 + 18 + 'px';
            cat.style.animationDelay = Math.random() * 2 + 's';
            catContainer.appendChild(cat);
            setTimeout(() => { cat.remove(); }, duration * 1000);
        }
        
        // Создаем котиков с задержкой
        setTimeout(() => {
            setInterval(createCat, 800);
        }, 500);
        
        // Добавляем несколько сразу
        for (let i = 0; i < 3; i++) {
            setTimeout(createCat, i * 300);
        }
    </script>
</body>
</html>
