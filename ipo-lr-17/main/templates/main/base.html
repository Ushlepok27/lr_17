<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #f0e6dc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Декоративные круги на фоне */
        body::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 109, 83, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 140, 83, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 45px 45px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 20px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            max-width: 480px;
            width: 100%;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.1),
                0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Анимированная иконка */
        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .emoji {
            font-size: 72px;
            display: block;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(78, 140, 83, 0.2));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        /* Конфетти-эффект (маленькие точки) */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        .confetti:nth-child(1) {
            top: -10px;
            right: -20px;
            background: #f5a623;
            animation-delay: 0s;
        }

        .confetti:nth-child(2) {
            bottom: 10px;
            left: -25px;
            background: #4e8c53;
            animation-delay: 0.5s;
            width: 6px;
            height: 6px;
        }

        .confetti:nth-child(3) {
            top: 20px;
            left: -15px;
            background: #e87461;
            animation-delay: 1s;
            width: 10px;
            height: 10px;
        }

        .confetti:nth-child(4) {
            bottom: -5px;
            right: -15px;
            background: #6d9fd8;
            animation-delay: 0.3s;
            width: 7px;
            height: 7px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-8px) rotate(180deg); opacity: 1; }
        }

        h1 {
            color: #3d7a42;
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #8c7a6b;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #8c6d53, #b8957a);
            border-radius: 2px;
            margin: 16px auto 20px;
        }

        p {
            color: #6b5f55;
            font-size: 17px;
            line-height: 1.7;
            font-weight: 400;
        }

        p:first-of-type {
            margin-bottom: 12px;
        }

        .order-number {
            display: inline-block;
            background: linear-gradient(135deg, #f8f2ec, #f0e8e0);
            color: #6d5340;
            font-weight: 700;
            font-size: 22px;
            padding: 8px 24px;
            border-radius: 50px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(140, 109, 83, 0.15);
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #8c6d53, #7a5d46);
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 28px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(140, 109, 83, 0.25);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            border-radius: 50px;
            pointer-events: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(140, 109, 83, 0.35);
            background: linear-gradient(135deg, #7a5d46, #6d5340);
        }

        .btn:active {
            transform: translateY(0px);
            box-shadow: 0 2px 10px rgba(140, 109, 83, 0.2);
        }

        /* Дополнительный маленький текст */
        .footer-note {
            margin-top: 20px;
            font-size: 13px;
            color: #b5a89b;
            letter-spacing: 0.2px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .card {
                padding: 35px 25px 30px;
                border-radius: 24px;
            }

            h1 {
                font-size: 28px;
            }

            .emoji {
                font-size: 56px;
            }

            .order-number {
                font-size: 18px;
                padding: 6px 18px;
            }

            .btn {
                padding: 12px 32px;
                font-size: 15px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrapper">
            <span class="emoji">🎉</span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
        </div>

        <h1>Заказ оформлен!</h1>
        <p class="subtitle">Ваш заказ успешно принят</p>

        <div class="divider"></div>

        <p>Спасибо за покупку!<br>Мы свяжемся с вами в ближайшее время.</p>

        <p>
            <span class="order-number">#{{ order.id }}</span>
        </p>

        <a href="/catalog/" class="btn">Продолжить покупки →</a>
        
        <p class="footer-note">Мы всегда рады вам ❤️</p>
    </div>
</body>
</html>
